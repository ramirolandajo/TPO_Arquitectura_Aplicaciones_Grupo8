server:
  port: 8085

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:h2:mem:ordersdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Clave secreta para validar JWT (debe coincidir con auth-service)
jwt:
  secret: MiClaveSecretaParaJWT_MuyLarga_Y_Segura_123456789

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
